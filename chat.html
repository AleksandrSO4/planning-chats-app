<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чат планирования</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #faf7f6;
            --card: #ffffff;
            --grad: linear-gradient(135deg, #ff6462 0%, #d85aa9 50%, #7b4dff 100%);
            --primary: #ff6462;
            --secondary: #7b4dff;
            --accent: #f6c85f;
            --text: #1f1f25;
            --muted: #8b8b95;
            --shadow: 0 8px 30px rgba(123, 77, 255, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: -150px;
            right: -150px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 100, 98, 0.18), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: -120px;
            left: -120px;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(123, 77, 255, 0.15), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            border: none;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.04);
        }

        .back-btn, .participants-btn, .revoke-btn {
            background: #fff;
            border: none;
            box-shadow: var(--shadow);
            font-size: 22px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary);
            border-radius: 12px;
            flex-shrink: 0;
        }
        .revoke-btn { color: #cc5500; font-size: 18px; }
        .back-btn:active, .participants-btn:active, .revoke-btn:active { background: #f0f0f0; }

        .header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-title {
            font-weight: 600;
            font-size: 17px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-sub {
            font-size: 12px;
            color: var(--primary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        .scroll-down-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--grad);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.2s;
            border: none;
            font-size: 24px;
        }
        .scroll-down-btn.visible { opacity: 1; }
        .scroll-down-btn:active { background: #cc5500; }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message-own { align-items: flex-end; align-self: flex-end; }
        .message-other { align-items: flex-start; align-self: flex-start; }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-own .message-bubble {
            background: var(--grad);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 6px 18px rgba(123, 77, 255, 0.18);
        }

        .message-other .message-bubble {
            background: #fff;
            border: none;
            color: var(--text);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
        }

        .message-name {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--primary);
        }

        .message-time {
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            margin-left: 8px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 4px;
            cursor: pointer;
        }

        .input-area {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-items: center;
            border: none;
        }

        .input-area input {
            flex: 1;
            border: none;
            background: #fff;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 15px;
            outline: none;
            box-shadow: inset 0 0 0 1px rgba(123, 77, 255, 0.08);
        }

        .input-area input:focus { box-shadow: inset 0 0 0 1px var(--secondary); }

        .photo-btn, .send-btn {
            border: none;
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            flex-shrink: 0;
        }

        .photo-btn {
            background: #fff;
            box-shadow: var(--shadow);
            color: var(--secondary);
        }
        .photo-btn:active { background: #f0f0f0; }

        .send-btn {
            background: var(--grad);
            color: white;
            box-shadow: 0 8px 20px rgba(123, 77, 255, 0.25);
        }
        .send-btn:active { background: #cc5500; }

        .empty-chat {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 10px;
            color: var(--secondary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.05);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .participants-modal, .photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .participants-modal.visible, .photo-modal.visible { display: flex; }

        .participants-content {
            background: #fff;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
            animation: slideUp 0.3s ease-out;
        }

        .photo-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .photo-content img {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .close-photo-btn {
            position: absolute;
            top: -40px;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .participants-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }

        .participant-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .participant-item:last-child { border-bottom: none; }

        .participant-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--grad);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }

        .participant-name {
            flex: 1;
            font-size: 15px;
            color: var(--text);
            font-weight: 500;
        }

        .close-modal-btn {
            background: #fff;
            border: none;
            box-shadow: var(--shadow);
            color: var(--secondary);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
        }
        .close-modal-btn:active { background: #f0f0f0; }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="header-info">
        <div class="chat-title" id="chat-title">Загрузка...</div>
        <div class="chat-sub" id="chat-sub">Загрузка...</div>
    </div>
    <button class="revoke-btn" onclick="revokeChat()">🔒</button>
    <button class="participants-btn" onclick="showParticipants()">👥</button>
</div>

<div class="messages-container" id="messages-container">
    <div class="loading"><div class="spinner"></div><span>Загрузка сообщений...</span></div>
</div>

<button class="scroll-down-btn" id="scroll-down-btn" onclick="scrollToBottom()">↓</button>

<div class="input-area">
    <button class="photo-btn" onclick="sendPhoto()">📷</button>
    <input type="text" id="message-input" placeholder="Напишите сообщение...">
    <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<div class="participants-modal" id="participants-modal" onclick="if(event.target === this) hideParticipants()">
    <div class="participants-content">
        <div class="participants-header">Участники чата</div>
        <div id="participants-list"></div>
        <button class="close-modal-btn" onclick="hideParticipants()">Закрыть</button>
    </div>
</div>

<div class="photo-modal" id="photo-modal" onclick="hidePhotoModal()">
    <div class="photo-content">
        <button class="close-photo-btn" onclick="hidePhotoModal()">✕</button>
        <img id="modal-photo-img" src="">
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const apiBase = 'https://birthdaybot-production-2460.up.railway.app';
    let userId = null;
    let token = null;
    let birthdayName = null;
    let updateInterval = null;
    let isUserScrolledUp = false;

    const urlParams = new URLSearchParams(window.location.search);
    token = urlParams.get('token');
    birthdayName = urlParams.get('name');

    if (!token) {
        document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Ошибка: не передан токен чата</div>';
        throw new Error('No token');
    }

    if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
        userId = Telegram.WebApp.initDataUnsafe.user.id;
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#ffffff');
    } else {
        userId = prompt('Введите ваш Telegram ID:');
    }

    if (!userId) {
        document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Не удалось определить пользователя</div>';
        throw new Error('No user');
    }

    if (birthdayName) {
        document.getElementById('chat-title').textContent = `🎂 ${decodeURIComponent(birthdayName)}`;
        document.getElementById('chat-sub').textContent = `Планируем поздравление`;
    } else {
        document.getElementById('chat-title').textContent = `Чат планирования`;
        document.getElementById('chat-sub').textContent = `Обсуждение подарков`;
    }

    const container = document.getElementById('messages-container');
    const scrollBtn = document.getElementById('scroll-down-btn');

    function checkScrollPosition() {
        const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
        if (isAtBottom) {
            isUserScrolledUp = false;
            scrollBtn.classList.remove('visible');
        } else {
            isUserScrolledUp = true;
            scrollBtn.classList.add('visible');
        }
    }

    function scrollToBottom() {
        container.scrollTop = container.scrollHeight;
        isUserScrolledUp = false;
        scrollBtn.classList.remove('visible');
    }

    container.addEventListener('scroll', checkScrollPosition);

    function showPhotoModal(url) {
        const modal = document.getElementById('photo-modal');
        const img = document.getElementById('modal-photo-img');
        img.src = url;
        modal.classList.add('visible');
    }

    function hidePhotoModal() {
        document.getElementById('photo-modal').classList.remove('visible');
    }

    async function revokeChat() {
        if (confirm('Закрыть чат досрочно? Все сообщения будут удалены, доступ пропадёт.')) {
            try {
                const res = await fetch(`${apiBase}/planning_chat/${token}/revoke?user_id=${userId}`, {
                    method: 'POST'
                });
                if (res.ok) {
                    alert('Чат закрыт. Вы будете перенаправлены.');
                    window.location.href = 'index.html';
                } else {
                    const error = await res.json();
                    alert('Ошибка: ' + (error.detail || 'Не удалось закрыть чат'));
                }
            } catch (e) {
                alert('Ошибка сети');
            }
        }
    }

    async function loadMessages() {
        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/messages?user_id=${userId}`);

            if (res.status === 403) {
                container.innerHTML = '<div class="empty-chat">🔒 У вас нет доступа к этому чату</div>';
                return;
            }

            if (!res.ok) {
                container.innerHTML = '<div class="empty-chat">❌ Ошибка загрузки сообщений</div>';
                return;
            }

            const messages = await res.json();

            if (!messages.length) {
                container.innerHTML = '<div class="empty-chat">💬 Сообщений пока нет. Напишите первым!</div>';
                checkScrollPosition();
                return;
            }

            const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
            const oldScrollHeight = container.scrollHeight;
            const oldScrollTop = container.scrollTop;

            let html = '';
            for (const msg of messages) {
                const isOwn = msg.user_id == userId;
                const senderName = msg.first_name || msg.username || 'Пользователь';

                const dateStr = msg.sent_at.endsWith('Z') ? msg.sent_at : msg.sent_at + 'Z';
                const date = new Date(dateStr);
                const localTime = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                let messageContent = escapeHtml(msg.message);
                const photoMatch = msg.message.match(/\[Фото\]\((https:\/\/[^\)]+)\)/);
                if (photoMatch) {
                    const photoUrl = photoMatch[1];
                    messageContent = `<img src="${photoUrl}" class="message-image" onclick="showPhotoModal('${photoUrl}')">`;
                }

                html += `
                    <div class="message ${isOwn ? 'message-own' : 'message-other'}">
                        ${!isOwn ? `<div class="message-name">${escapeHtml(senderName)}</div>` : ''}
                        <div class="message-bubble">${messageContent}</div>
                        <div class="message-time">${localTime}</div>
                    </div>
                `;
            }

            container.innerHTML = html;

            if (wasAtBottom && !isUserScrolledUp) {
                container.scrollTop = container.scrollHeight;
            } else {
                const newScrollHeight = container.scrollHeight;
                container.scrollTop = oldScrollTop + (newScrollHeight - oldScrollHeight);
            }

            checkScrollPosition();
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="empty-chat">❌ Ошибка подключения к серверу</div>';
        }
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';

        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, text: text })
            });

            if (res.ok) {
                await loadMessages();
            } else {
                const error = await res.json();
                alert('Ошибка: ' + (error.detail || 'Не удалось отправить'));
            }
        } catch (e) {
            alert('Ошибка сети');
            console.error(e);
        }
    }

    async function sendPhoto() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${apiBase}/planning_chat/${token}/upload_photo?user_id=${userId}`, {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    await loadMessages();
                } else {
                    alert('❌ Ошибка отправки фото');
                }
            } catch (e) {
                alert('❌ Ошибка сети');
                console.error(e);
            }
        };
        input.click();
    }

    async function showParticipants() {
        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/participants?user_id=${userId}`);
            if (!res.ok) {
                alert('Ошибка загрузки участников');
                return;
            }
            const participants = await res.json();
            const listEl = document.getElementById('participants-list');

            if (!participants.length) {
                listEl.innerHTML = '<p style="text-align:center;color:var(--muted);padding:20px;">Нет участников</p>';
            } else {
                let html = '';
                for (const p of participants) {
                    const name = p.first_name || p.username || `User ${p.user_id}`;
                    const initial = name[0].toUpperCase();
                    const avatarId = `avatar-${p.user_id}`;

                    html += `
                        <div class="participant-item">
                            <div class="participant-avatar" id="${avatarId}">${initial}</div>
                            <div class="participant-name">${escapeHtml(name)}</div>
                        </div>
                    `;
                }
                listEl.innerHTML = html;

                for (const p of participants) {
                    const avatarId = `avatar-${p.user_id}`;
                    fetch(`${apiBase}/avatar/user/${p.user_id}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.exists && data.url) {
                                const avatarDiv = document.getElementById(avatarId);
                                if (avatarDiv) {
                                    avatarDiv.innerHTML = `<img src="${data.url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">`;
                                }
                            }
                        })
                        .catch(err => console.error('Avatar load error:', err));
                }
            }

            document.getElementById('participants-modal').classList.add('visible');
        } catch (e) {
            console.error(e);
            alert('Ошибка сети');
        }
    }

    function hideParticipants() {
        document.getElementById('participants-modal').classList.remove('visible');
    }

    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function goBack() {
        if (updateInterval) clearInterval(updateInterval);
        window.location.href = 'index.html';
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadMessages();
    updateInterval = setInterval(loadMessages, 5000);
</script>
</body>
</html>
