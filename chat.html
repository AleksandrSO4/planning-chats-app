<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чат планирования</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #f5f0fb;
            --card: #ffffff;
            --grad: linear-gradient(135deg, #f76fa1 0%, #c260e8 60%, #7b52f0 100%);
            --primary: #e056a0;
            --secondary: #7b52f0;
            --text: #1a1626;
            --muted: #9490a8;
            --border: rgba(123,82,240,0.10);
            --shadow-card: 0 2px 16px rgba(123,82,240,0.10);
            --shadow-strong: 0 8px 32px rgba(123,82,240,0.18);
            --bubble-own-shadow: 0 6px 20px rgba(194,96,232,0.30);
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: -80px; right: -80px;
            width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(247,111,161,0.20), transparent 65%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: "";
            position: fixed;
            bottom: -60px; left: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(123,82,240,0.16), transparent 65%);
            pointer-events: none; z-index: 0;
        }

        /* HEADER */
        .header {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            box-shadow: 0 1px 0 var(--border);
            position: relative;
            z-index: 10;
        }

        .header-btn {
            background: #fff;
            border: none;
            box-shadow: var(--shadow-card);
            border-radius: 12px;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            cursor: pointer;
            color: var(--secondary);
            flex-shrink: 0;
            transition: transform 0.12s;
        }
        .header-btn:active { transform: scale(0.92); }
        .revoke-btn { color: #d94f4f; font-size: 16px; }

        .header-info { flex: 1; min-width: 0; }
        .chat-title {
            font-size: 16px; font-weight: 800;
            letter-spacing: -0.2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chat-sub {
            font-size: 12px; color: var(--primary); font-weight: 600;
            margin-top: 1px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* MESSAGES */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 1;
            -webkit-overflow-scrolling: touch;
        }

        /* Date divider */
        .date-divider {
            text-align: center;
            margin: 6px 0;
        }
        .date-divider span {
            font-size: 11px; font-weight: 700;
            color: var(--muted);
            background: rgba(148,144,168,0.12);
            padding: 3px 10px;
            border-radius: 10px;
        }

        /* Scroll down button */
        .scroll-down-btn {
            position: fixed;
            bottom: 82px; right: 16px;
            background: var(--grad);
            color: white;
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-strong);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.2s;
            border: none;
            font-size: 20px;
        }
        .scroll-down-btn.visible { opacity: 1; }

        /* MESSAGES */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 78%;
        }
        .message-own { align-items: flex-end; align-self: flex-end; }
        .message-other { align-items: flex-start; align-self: flex-start; }

        .message-name {
            font-size: 11px; font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
            padding-left: 4px;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.45;
            word-wrap: break-word;
            word-break: break-word;
        }

        .message-own .message-bubble {
            background: var(--grad);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: var(--bubble-own-shadow);
        }

        .message-other .message-bubble {
            background: #fff;
            color: var(--text);
            border-bottom-left-radius: 5px;
            box-shadow: var(--shadow-card);
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            padding: 0 4px;
        }
        .message-time {
            font-size: 10px; font-weight: 700;
            color: var(--muted);
        }
        .message-own .message-meta { flex-direction: row-reverse; }
        .check-icon { font-size: 10px; color: var(--muted); }

        /* Image in message */
        .message-image {
            max-width: 210px;
            max-height: 210px;
            border-radius: 14px;
            cursor: pointer;
            display: block;
            object-fit: cover;
        }

        /* Empty state in chat */
        .empty-chat {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 15px; font-weight: 600;
        }

        /* LOADING */
        .loading {
            display: flex; justify-content: center; align-items: center;
            height: 100%; gap: 10px;
            color: var(--muted); font-size: 14px; font-weight: 600;
        }
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(123,82,240,0.15);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* INPUT AREA */
        .input-area {
            background: rgba(255,255,255,0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 14px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-items: center;
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .input-field {
            flex: 1;
            border: none;
            background: var(--bg);
            border-radius: 24px;
            padding: 11px 16px;
            font-size: 15px; font-weight: 600;
            outline: none;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            transition: box-shadow 0.15s;
        }
        .input-field::placeholder { color: var(--muted); }
        .input-field:focus { box-shadow: 0 0 0 2px rgba(123,82,240,0.20); }

        .icon-btn {
            border: none;
            border-radius: 50%;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 20px;
            flex-shrink: 0;
            transition: transform 0.12s;
        }
        .icon-btn:active { transform: scale(0.90); }

        .photo-btn {
            background: #fff;
            color: var(--secondary);
            box-shadow: var(--shadow-card);
        }

        .send-btn {
            background: var(--grad);
            color: white;
            box-shadow: 0 6px 18px rgba(194,96,232,0.32);
        }

        /* MODALS */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20,10,40,0.75);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.visible { display: flex; }

        .photo-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20,10,40,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .photo-modal-overlay.visible { display: flex; }

        /* Participants sheet */
        .sheet {
            background: #fff;
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-height: 70vh;
            overflow-y: auto;
            padding: 6px 20px 32px;
            animation: slideUp 0.28s cubic-bezier(0.34, 1.20, 0.64, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .sheet-handle {
            width: 40px; height: 4px;
            background: rgba(148,144,168,0.30);
            border-radius: 2px;
            margin: 12px auto 18px;
        }

        .sheet-title {
            font-size: 18px; font-weight: 800;
            margin-bottom: 16px; letter-spacing: -0.3px;
        }

        .participant-item {
            display: flex; align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .participant-item:last-child { border-bottom: none; }

        .participant-avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--grad);
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 16px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(247,111,161,0.22);
            overflow: hidden;
        }

        .participant-name {
            flex: 1; font-size: 15px; font-weight: 700; color: var(--text);
        }

        .close-sheet-btn {
            background: var(--bg);
            border: none;
            color: var(--secondary);
            padding: 13px;
            border-radius: 16px;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
            font-size: 15px; font-weight: 800;
            font-family: 'Nunito', sans-serif;
        }

        /* Photo modal */
        .photo-content {
            position: relative;
            max-width: 92%;
            max-height: 92%;
        }
        .photo-content img {
            width: 100%; height: auto;
            border-radius: 16px;
            display: block;
        }
        .close-photo-btn {
            position: absolute;
            top: -44px; right: 0;
            background: rgba(255,255,255,0.18);
            color: white;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="header-btn" onclick="goBack()">←</button>
    <div class="header-info">
        <div class="chat-title" id="chat-title">Загрузка...</div>
        <div class="chat-sub" id="chat-sub">Загрузка...</div>
    </div>
    <button class="header-btn revoke-btn" onclick="revokeChat()" title="Закрыть чат">🔒</button>
    <button class="header-btn" onclick="showParticipants()" title="Участники">👥</button>
</div>

<div class="messages-container" id="messages-container">
    <div class="loading"><div class="spinner"></div><span>Загрузка сообщений...</span></div>
</div>

<button class="scroll-down-btn" id="scroll-down-btn" onclick="scrollToBottom()">↓</button>

<div class="input-area">
    <button class="icon-btn photo-btn" onclick="sendPhoto()">📷</button>
    <input class="input-field" type="text" id="message-input" placeholder="Напишите сообщение...">
    <button class="icon-btn send-btn" onclick="sendMessage()">➤</button>
</div>

<!-- Participants sheet -->
<div class="modal-overlay" id="participants-modal" onclick="if(event.target===this) hideParticipants()">
    <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Участники чата</div>
        <div id="participants-list"></div>
        <button class="close-sheet-btn" onclick="hideParticipants()">Закрыть</button>
    </div>
</div>

<!-- Photo modal -->
<div class="photo-modal-overlay" id="photo-modal" onclick="hidePhotoModal()">
    <div class="photo-content">
        <button class="close-photo-btn" onclick="hidePhotoModal()">✕</button>
        <img id="modal-photo-img" src="" alt="">
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const apiBase = 'https://birthdaybot-production-2460.up.railway.app';
    let userId = null;
    let token = null;
    let birthdayName = null;
    let updateInterval = null;
    let isUserScrolledUp = false;

    const urlParams = new URLSearchParams(window.location.search);
    token = urlParams.get('token');
    birthdayName = urlParams.get('name');

    if (!token) {
        document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Ошибка: не передан токен чата</div>';
        throw new Error('No token');
    }

    if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
        userId = Telegram.WebApp.initDataUnsafe.user.id;
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#ffffff');
    } else {
        userId = prompt('Введите ваш Telegram ID:');
    }

    if (!userId) {
        document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Не удалось определить пользователя</div>';
        throw new Error('No user');
    }

    if (birthdayName) {
        document.getElementById('chat-title').textContent = `🎂 ${decodeURIComponent(birthdayName)}`;
        document.getElementById('chat-sub').textContent = 'Планируем поздравление';
    } else {
        document.getElementById('chat-title').textContent = 'Чат планирования';
        document.getElementById('chat-sub').textContent = 'Обсуждение подарков';
    }

    const container = document.getElementById('messages-container');
    const scrollBtn = document.getElementById('scroll-down-btn');

    function checkScrollPosition() {
        const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
        if (isAtBottom) {
            isUserScrolledUp = false;
            scrollBtn.classList.remove('visible');
        } else {
            isUserScrolledUp = true;
            scrollBtn.classList.add('visible');
        }
    }

    function scrollToBottom() {
        container.scrollTop = container.scrollHeight;
        isUserScrolledUp = false;
        scrollBtn.classList.remove('visible');
    }

    container.addEventListener('scroll', checkScrollPosition);

    function showPhotoModal(url) {
        document.getElementById('modal-photo-img').src = url;
        document.getElementById('photo-modal').classList.add('visible');
    }
    function hidePhotoModal() {
        document.getElementById('photo-modal').classList.remove('visible');
    }

    async function revokeChat() {
        if (confirm('Закрыть чат досрочно? Все сообщения будут удалены.')) {
            try {
                const res = await fetch(`${apiBase}/planning_chat/${token}/revoke?user_id=${userId}`, { method: 'POST' });
                if (res.ok) {
                    alert('Чат закрыт.');
                    window.location.href = 'index.html';
                } else {
                    const error = await res.json();
                    alert('Ошибка: ' + (error.detail || 'Не удалось закрыть чат'));
                }
            } catch (e) { alert('Ошибка сети'); }
        }
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let lastDateShown = '';

    async function loadMessages() {
        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/messages?user_id=${userId}`);
            if (res.status === 403) {
                container.innerHTML = '<div class="empty-chat">🔒 У вас нет доступа к этому чату</div>';
                return;
            }
            if (!res.ok) {
                container.innerHTML = '<div class="empty-chat">❌ Ошибка загрузки сообщений</div>';
                return;
            }

            const messages = await res.json();

            if (!messages.length) {
                container.innerHTML = '<div class="empty-chat">💬 Сообщений пока нет.<br>Напишите первым!</div>';
                checkScrollPosition();
                return;
            }

            const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
            const oldScrollHeight = container.scrollHeight;
            const oldScrollTop = container.scrollTop;

            let html = '';
            let prevDate = '';

            for (const msg of messages) {
                const isOwn = msg.user_id == userId;
                const senderName = msg.first_name || msg.username || 'Пользователь';
                const dateStr = msg.sent_at.endsWith('Z') ? msg.sent_at : msg.sent_at + 'Z';
                const date = new Date(dateStr);
                const localTime = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dayLabel = date.toLocaleDateString('ru', { day: 'numeric', month: 'long' });

                if (dayLabel !== prevDate) {
                    html += `<div class="date-divider"><span>${dayLabel}</span></div>`;
                    prevDate = dayLabel;
                }

                let messageContent = escapeHtml(msg.message);
                const photoMatch = msg.message.match(/\[Фото\]\((https:\/\/[^\)]+)\)/);
                if (photoMatch) {
                    const photoUrl = photoMatch[1];
                    messageContent = `<img src="${photoUrl}" class="message-image" onclick="showPhotoModal('${photoUrl}')">`;
                }

                html += `
                <div class="message ${isOwn ? 'message-own' : 'message-other'}">
                    ${!isOwn ? `<div class="message-name">${escapeHtml(senderName)}</div>` : ''}
                    <div class="message-bubble">${messageContent}</div>
                    <div class="message-meta">
                        <span class="message-time">${localTime}</span>
                        ${isOwn ? '<span class="check-icon">✓✓</span>' : ''}
                    </div>
                </div>`;
            }

            container.innerHTML = html;

            if (wasAtBottom && !isUserScrolledUp) {
                container.scrollTop = container.scrollHeight;
            } else {
                container.scrollTop = oldScrollTop + (container.scrollHeight - oldScrollHeight);
            }

            checkScrollPosition();
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="empty-chat">❌ Ошибка подключения к серверу</div>';
        }
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, text })
            });
            if (res.ok) {
                await loadMessages();
            } else {
                const err = await res.json();
                alert('Ошибка: ' + (err.detail || 'Не удалось отправить'));
            }
        } catch (e) { alert('Ошибка сети'); }
    }

    async function sendPhoto() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch(`${apiBase}/planning_chat/${token}/upload_photo?user_id=${userId}`, {
                    method: 'POST',
                    body: formData
                });
                if (res.ok) await loadMessages();
                else alert('❌ Ошибка отправки фото');
            } catch (e) { alert('❌ Ошибка сети'); }
        };
        input.click();
    }

    async function showParticipants() {
        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/participants?user_id=${userId}`);
            if (!res.ok) { alert('Ошибка загрузки участников'); return; }
            const participants = await res.json();
            const listEl = document.getElementById('participants-list');

            if (!participants.length) {
                listEl.innerHTML = '<p style="text-align:center;color:var(--muted);padding:20px;font-weight:600;">Нет участников</p>';
            } else {
                let html = '';
                for (const p of participants) {
                    const name = p.first_name || p.username || `User ${p.user_id}`;
                    const initial = name[0].toUpperCase();
                    const avatarId = `p-avatar-${p.user_id}`;
                    html += `
                    <div class="participant-item">
                        <div class="participant-avatar" id="${avatarId}">${initial}</div>
                        <div class="participant-name">${escapeHtml(name)}</div>
                    </div>`;
                }
                listEl.innerHTML = html;
                for (const p of participants) {
                    fetch(`${apiBase}/avatar/user/${p.user_id}`)
                        .then(r => r.json())
                        .then(data => {
                            if (data.exists && data.url) {
                                const el = document.getElementById(`p-avatar-${p.user_id}`);
                                if (el) el.innerHTML = `<img src="${data.url}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;">`;
                            }
                        })
                        .catch(() => {});
                }
            }
            document.getElementById('participants-modal').classList.add('visible');
        } catch (e) { alert('Ошибка сети'); }
    }

    function hideParticipants() {
        document.getElementById('participants-modal').classList.remove('visible');
    }

    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function goBack() {
        if (updateInterval) clearInterval(updateInterval);
        window.location.href = 'index.html';
    }

    loadMessages();
    updateInterval = setInterval(loadMessages, 5000);
</script>
</body>
</html>
