<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чат планирования</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff8f2;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .header {
            background: #fff;
            border-bottom: 1px solid #ffe0c8;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .back-btn {
            background: #fff3ea;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff6b00;
        }

        .back-btn:active { background: #ffe0c8; }

        .chat-title {
            flex: 1;
            font-weight: 600;
            font-size: 17px;
            color: #1a1a1a;
        }

        .chat-sub {
            font-size: 12px;
            color: #ff6b00;
            margin-top: 2px;
        }

        /* Сообщения */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message-own { align-items: flex-end; align-self: flex-end; }
        .message-other { align-items: flex-start; align-self: flex-start; }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-own .message-bubble {
            background: #ff6b00;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-other .message-bubble {
            background: white;
            border: 1px solid #ffe0c8;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }

        .message-name {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ff6b00;
        }

        .message-time {
            font-size: 10px;
            color: #aaa;
            margin-top: 4px;
            margin-left: 8px;
        }

        /* Панель ввода */
        .input-area {
            background: #fff;
            border-top: 1px solid #ffe0c8;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ffd4b0;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 15px;
            outline: none;
            background: #fff;
        }

        .input-area input:focus { border-color: #ff6b00; }

        .send-btn {
            background: #ff6b00;
            border: none;
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.15s;
        }

        .send-btn:active { background: #cc5500; }

        .empty-chat {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 10px;
            color: #ff6b00;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ffe0c8;
            border-top-color: #ff6b00;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div>
        <div class="chat-title" id="chat-title">Загрузка...</div>
        <div class="chat-sub" id="chat-sub">Чат планирования</div>
    </div>
</div>

<div class="messages-container" id="messages-container">
    <div class="loading"><div class="spinner"></div><span>Загрузка сообщений...</span></div>
</div>

<div class="input-area">
    <input type="text" id="message-input" placeholder="Напишите сообщение...">
    <button class="send-btn" onclick="sendMessage()">📤</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const apiBase = 'https://birthdaybot-production-2460.up.railway.app';
    let userId = null;
    let token = null;

    // Получаем токен из URL
    const urlParams = new URLSearchParams(window.location.search);
    token = urlParams.get('token');

    if (!token) {
        document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Ошибка: не передан токен чата</div>';
        throw new Error('No token');
    }

    // Получаем user_id из Telegram WebApp
    if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
        userId = Telegram.WebApp.initDataUnsafe.user.id;
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#ffffff');
    } else {
        // Для теста вне Telegram (можно убрать, но оставим как fallback)
        userId = prompt('Введите ваш Telegram ID (для теста):');
    }

    if (!userId) {
        document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Не удалось определить пользователя</div>';
        throw new Error('No user');
    }

    let currentChatName = '';
    let updateInterval = null;

    // Загружаем информацию о чате
    async function loadChatInfo() {
        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/messages?user_id=${userId}`);
            if (res.status === 403) {
                document.getElementById('messages-container').innerHTML = '<div class="empty-chat">🔒 У вас нет доступа к этому чату</div>';
                return false;
            }
            if (res.ok) {
                const data = await res.json();
                if (data.length > 0 && data[0].birthday_name) {
                    currentChatName = data[0].birthday_name;
                    document.getElementById('chat-title').textContent = `🎂 ${currentChatName}`;
                }
                return true;
            }
            return false;
        } catch (e) {
            console.error(e);
            return false;
        }
    }

    // Загружаем сообщения
    async function loadMessages() {
        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/messages?user_id=${userId}`);
            if (res.status === 403) {
                document.getElementById('messages-container').innerHTML = '<div class="empty-chat">🔒 Доступ запрещён</div>';
                return;
            }
            if (!res.ok) {
                document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Ошибка загрузки сообщений</div>';
                return;
            }

            const messages = await res.json();
            const container = document.getElementById('messages-container');

            if (!messages.length) {
                container.innerHTML = '<div class="empty-chat">💬 Сообщений пока нет. Напишите первым!</div>';
                return;
            }

            let html = '';
            messages.forEach(msg => {
                const isOwn = msg.user_id == userId;
                const senderName = msg.first_name || msg.username || 'Пользователь';
                const time = new Date(msg.sent_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                html += `
                    <div class="message ${isOwn ? 'message-own' : 'message-other'}">
                        ${!isOwn ? `<div class="message-name">${escapeHtml(senderName)}</div>` : ''}
                        <div class="message-bubble">${escapeHtml(msg.message)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        } catch (e) {
            console.error(e);
            document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Ошибка подключения</div>';
        }
    }

    // Отправка сообщения
    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';

        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, text: text })
            });

            if (res.ok) {
                await loadMessages();
            } else {
                const error = await res.json();
                alert('Ошибка: ' + (error.detail || 'Не удалось отправить'));
            }
        } catch (e) {
            alert('Ошибка сети');
            console.error(e);
        }
    }

    // Отправка по Enter
    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function goBack() {
        if (updateInterval) clearInterval(updateInterval);
        window.location.href = 'index.html';
    }

    // Инициализация
    async function init() {
        const hasAccess = await loadChatInfo();
        if (!hasAccess) return;
        await loadMessages();
        // Обновляем каждые 5 секунд
        updateInterval = setInterval(loadMessages, 5000);
    }

    init();
</script>
</body>
</html>
