<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чат планирования</title>
    <style>
        body { font-family: system-ui; margin: 0; padding: 0; background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }
        .messages { flex-grow: 1; overflow-y: auto; padding: 16px; }
        .message { background: white; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; max-width: 80%; }
        .message strong { display: block; font-size: 12px; color: #3390ec; }
        .input-area { display: flex; padding: 12px; background: white; border-top: 1px solid #ddd; }
        .input-area input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 20px; margin-right: 8px; }
        .input-area button { background: #3390ec; color: white; border: none; border-radius: 20px; padding: 8px 16px; }
        .my-message { background: #dcf8c5; align-self: flex-end; }
    </style>
</head>
<body>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <button id="sendBtn">Отправить</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert('Ошибка: не передан токен чата');
            throw new Error('No token');
        }

        // Получаем user_id из Telegram WebApp, если запущено внутри Telegram, иначе заглушка
        let userId = null;
        if (window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user) {
            userId = Telegram.WebApp.initDataUnsafe.user.id;
        } else {
            // Для тестирования вне Telegram можно ввести вручную
            userId = prompt('Введите ваш Telegram ID (для теста):');
        }

        if (!userId) {
            alert('Не удалось определить пользователя');
            throw new Error('No user');
        }

        const apiBase = 'https://birthdaybot-production-2460.up.railway.app';

        async function loadMessages() {
            try {
                const res = await fetch(`${apiBase}/planning_chat/${token}/messages?user_id=${userId}`);
                if (!res.ok) {
                    if (res.status === 403) alert('Нет доступа к чату');
                    return;
                }
                const messages = await res.json();
                const container = document.getElementById('messages');
                container.innerHTML = '';
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.user_id == userId ? 'my-message' : ''}`;
                    div.innerHTML = `<strong>${msg.first_name || msg.username || 'Пользователь'}</strong> ${msg.message}`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            try {
                const res = await fetch(`${apiBase}/planning_chat/${token}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, text: text })
                });
                if (res.ok) {
                    loadMessages();
                } else {
                    alert('Ошибка отправки');
                }
            } catch (err) {
                console.error(err);
                alert('Ошибка сети');
            }
        };

        loadMessages();
        setInterval(loadMessages, 5000); // обновляем каждые 5 секунд
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
