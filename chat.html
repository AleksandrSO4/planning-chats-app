<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чат планирования</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff8f2;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #fff;
            border-bottom: 1px solid #ffe0c8;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff6b00;
            border-radius: 10px;
        }
        .back-btn:active { background: #fff3ea; }

        .chat-title {
            flex: 1;
            font-weight: 600;
            font-size: 17px;
            color: #1a1a1a;
        }
        .chat-sub {
            font-size: 12px;
            color: #ff6b00;
            margin-top: 2px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message-own { align-items: flex-end; align-self: flex-end; }
        .message-other { align-items: flex-start; align-self: flex-start; }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-own .message-bubble {
            background: #ff6b00;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-other .message-bubble {
            background: white;
            border: 1px solid #ffe0c8;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }

        .message-name {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ff6b00;
        }

        .message-time {
            font-size: 10px;
            color: #aaa;
            margin-top: 4px;
            margin-left: 8px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 4px;
            cursor: pointer;
        }

        .input-area {
            background: #fff;
            border-top: 1px solid #ffe0c8;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ffd4b0;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 15px;
            outline: none;
            background: #fff;
        }

        .input-area input:focus { border-color: #ff6b00; }

        .photo-btn {
            background: #fff3ea;
            border: 1px solid #ffd4b0;
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }
        .photo-btn:active { background: #ffe0c8; }

        .send-btn {
            background: #ff6b00;
            border: none;
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: white;
        }
        .send-btn:active { background: #cc5500; }

        .empty-chat { text-align: center; padding: 60px 20px; color: #aaa; }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 10px;
            color: #ff6b00;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ffe0c8;
            border-top-color: #ff6b00;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1a1a1a;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeOut 3s ease-out forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div>
        <div class="chat-title" id="chat-title">Загрузка...</div>
        <div class="chat-sub" id="chat-sub">Загрузка...</div>
    </div>
</div>

<div class="messages-container" id="messages-container">
    <div class="loading"><div class="spinner"></div><span>Загрузка сообщений...</span></div>
</div>

<div class="input-area">
    <div class="photo-btn" onclick="sendPhoto()">📷</div>
    <input type="text" id="message-input" placeholder="Напишите сообщение...">
    <div class="send-btn" onclick="sendMessage()">➤</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const apiBase = 'https://birthdaybot-production-2460.up.railway.app';
    let userId = null;
    let token = null;
    let birthdayName = null;
    let updateInterval = null;

    const urlParams = new URLSearchParams(window.location.search);
    token = urlParams.get('token');
    birthdayName = urlParams.get('name');

    if (!token) {
        document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Ошибка: не передан токен чата</div>';
        throw new Error('No token');
    }

    if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
        userId = Telegram.WebApp.initDataUnsafe.user.id;
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#ffffff');
    } else {
        userId = prompt('Введите ваш Telegram ID:');
    }

    if (!userId) {
        document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Не удалось определить пользователя</div>';
        throw new Error('No user');
    }

    if (birthdayName) {
        document.getElementById('chat-title').textContent = `🎂 ${decodeURIComponent(birthdayName)}`;
        document.getElementById('chat-sub').textContent = `Планируем поздравление для ${decodeURIComponent(birthdayName)}`;
    } else {
        document.getElementById('chat-title').textContent = `Чат планирования`;
        document.getElementById('chat-sub').textContent = `Обсуждение подарков`;
    }

    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function loadMessages() {
        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/messages?user_id=${userId}`);

            if (res.status === 403) {
                document.getElementById('messages-container').innerHTML = '<div class="empty-chat">🔒 У вас нет доступа к этому чату</div>';
                return;
            }

            if (!res.ok) {
                document.getElementById('messages-container').innerHTML = '<div class="empty-chat">❌ Ошибка загрузки сообщений</div>';
                return;
            }

            const messages = await res.json();
            const container = document.getElementById('messages-container');

            if (!messages.length) {
                container.innerHTML = '<div class="empty-chat">💬 Сообщений пока нет. Напишите первым!</div>';
                return;
            }

            let html = '';
            for (const msg of messages) {
                const isOwn = msg.user_id == userId;
                const senderName = msg.first_name || msg.username || 'Пользователь';

                // Правильное преобразование времени
                const utcDate = new Date(msg.sent_at);
                const localTime = utcDate.toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });

                // Проверяем, есть ли в сообщении ссылка на фото
                let messageContent = escapeHtml(msg.message);
                const photoMatch = msg.message.match(/\[Фото\]\((https:\/\/[^\)]+)\)/);
                if (photoMatch) {
                    messageContent = `<img src="${photoMatch[1]}" class="message-image" onclick="window.open('${photoMatch[1]}', '_blank')">`;
                }

                html += `
                    <div class="message ${isOwn ? 'message-own' : 'message-other'}">
                        ${!isOwn ? `<div class="message-name">${escapeHtml(senderName)}</div>` : ''}
                        <div class="message-bubble">${messageContent}</div>
                        <div class="message-time">${localTime}</div>
                    </div>
                `;
            }
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';

        try {
            const res = await fetch(`${apiBase}/planning_chat/${token}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, text: text })
            });

            if (res.ok) {
                await loadMessages();
            } else {
                const error = await res.json();
                showToast('Ошибка: ' + (error.detail || 'Не удалось отправить'));
            }
        } catch (e) {
            showToast('Ошибка сети');
            console.error(e);
        }
    }

    async function sendPhoto() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showToast('📤 Загрузка фото...');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${apiBase}/planning_chat/${token}/upload_photo?user_id=${userId}`, {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    await loadMessages();
                    showToast('✅ Фото отправлено');
                } else {
                    showToast('❌ Ошибка отправки фото');
                }
            } catch (e) {
                showToast('❌ Ошибка сети');
                console.error(e);
            }
        };
        input.click();
    }

    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function goBack() {
        if (updateInterval) clearInterval(updateInterval);
        window.location.href = 'index.html';
    }

    function escapeHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadMessages();
    updateInterval = setInterval(loadMessages, 5000);
</script>
</body>
</html>
