<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чаты планирования</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff8f2;
            min-height: 100vh;
            color: #1a1a1a;
        }

        .header {
            background: #fff;
            border-bottom: 1px solid #ffe0c8;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-icon {
            width: 38px;
            height: 38px;
            background: #ff6b00;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .header-sub {
            font-size: 12px;
            color: #ff6b00;
            margin-top: 1px;
        }

        .refresh-btn {
            margin-left: auto;
            background: #fff3ea;
            border: 1px solid #ffd4b0;
            color: #ff6b00;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .refresh-btn:active { background: #ffe0c8; }

        .back-btn {
            background: #fff3ea;
            border: 1px solid #ffd4b0;
            color: #ff6b00;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: none;
        }

        .back-btn.visible { display: block; }

        .content { padding: 20px; }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #ff6b00;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 12px;
        }

        .card {
            background: #fff;
            border: 1px solid #ffe0c8;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            text-decoration: none;
            color: inherit;
        }

        .card:active { background: #fff3ea; border-color: #ffb580; }

        .card-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #fff3ea;
            border: 1px solid #ffd4b0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .card-avatar.orange {
            background: #ff6b00;
            border-color: #ff6b00;
        }

        .card-info { flex: 1; min-width: 0; }

        .card-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .card-arrow {
            font-size: 18px;
            color: #ffb580;
            flex-shrink: 0;
        }

        .days-badge {
            background: #fff3ea;
            color: #ff6b00;
            border: 1px solid #ffd4b0;
            border-radius: 8px;
            padding: 6px 10px;
            text-align: center;
            flex-shrink: 0;
            min-width: 70px;
        }

        .days-badge.warning { background: #ffaa00; border-color: #ffaa00; color: white; }
        .days-badge.danger { background: #cc5500; border-color: #cc5500; color: white; }

        .days-badge .days-num {
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
        }

        .days-badge .days-label {
            font-size: 10px;
            margin-top: 2px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
        }

        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
        .empty-sub { font-size: 13px; color: #888; line-height: 1.5; }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 14px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #ffe0c8;
            border-top-color: #ff6b00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: #888; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">🎉</div>
    <div>
        <div class="header-title">Чаты планирования</div>
        <div class="header-sub" id="header-sub">Выберите группу</div>
    </div>
    <button class="refresh-btn" onclick="refresh()">⟳</button>
    <button class="back-btn" id="back-btn" onclick="showGroups()">← Назад</button>
</div>

<div class="content" id="content">
    <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Загрузка...</div>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const apiBase = 'https://birthdaybot-production-2460.up.railway.app';
    let userId = null;
    let autoRefresh = null;
    let currentView = 'groups';
    let currentGroupId = null;
    let currentGroupName = '';

    // Получаем ID пользователя из Telegram
    if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
        userId = Telegram.WebApp.initDataUnsafe.user.id;
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#ffffff');
    } else {
        userId = prompt('Введите ваш Telegram ID (для теста):');
    }

    if (!userId) {
        showError('Не удалось определить пользователя');
    } else {
        loadGroups();
        startAutoRefresh();
    }

    // Функция для правильного склонения дней
    function formatDays(days) {
        if (days === 0) return 'сегодня';
        if (days === 1) return 'завтра';
        if (days >= 2 && days <= 4) return `${days} дня`;
        return `${days} дней`;
    }

    function startAutoRefresh() {
        if (autoRefresh) clearInterval(autoRefresh);
        autoRefresh = setInterval(() => {
            if (currentView === 'chats') {
                loadChats(currentGroupId, currentGroupName, true);
            } else if (currentView === 'groups') {
                loadGroups(true);
            }
        }, 30000);
    }

    function refresh() {
        if (currentView === 'chats') {
            loadChats(currentGroupId, currentGroupName, true);
        } else {
            loadGroups(true);
        }
    }

    function setLoading(text = 'Загрузка...') {
        document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">${text}</div></div>`;
    }

    function showError(msg) {
        document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-title">Ошибка</div><div class="empty-sub">${msg}</div></div>`;
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadGroups(silent = false) {
        if (!silent) {
            setLoading('Загружаем группы...');
            document.getElementById('back-btn').classList.remove('visible');
            document.getElementById('header-sub').textContent = 'Выберите группу';
        }
        currentView = 'groups';
        currentGroupId = null;

        try {
            const res = await fetch(`${apiBase}/my_groups/${userId}`);
            const groups = await res.json();

            if (!groups.length) {
                document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Нет групп</div><div class="empty-sub">Вы не состоите ни в одной группе, где есть бот</div></div>`;
                return;
            }

            let html = `<div class="section-label">Ваши группы</div>`;
            groups.forEach(g => {
                const name = g.group_name || `Группа ${g.group_id}`;
                html += `<div class="card" onclick="loadChats(${g.group_id}, '${escHtml(name)}')">
                            <div class="card-avatar">👥</div>
                            <div class="card-info">
                                <div class="card-name">${escHtml(name)}</div>
                                <div class="card-meta">Нажмите, чтобы открыть чаты</div>
                            </div>
                            <div class="card-arrow">›</div>
                        </div>`;
            });
            document.getElementById('content').innerHTML = html;

        } catch (e) {
            if (!silent) showError('Не удалось загрузить группы');
            console.error(e);
        }
    }

    async function loadChats(groupId, groupName, silent = false) {
        if (!silent) {
            setLoading('Загружаем чаты...');
            document.getElementById('back-btn').classList.add('visible');
            document.getElementById('header-sub').textContent = groupName;
        }
        currentView = 'chats';
        currentGroupId = groupId;
        currentGroupName = groupName;

        try {
            const res = await fetch(`${apiBase}/planning_chats/${groupId}`);
            const chats = await res.json();

            if (!chats.length) {
                document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">🎈</div><div class="empty-title">Нет активных чатов</div><div class="empty-sub">Чаты появятся автоматически за 7 дней до дня рождения</div></div>`;
                return;
            }

            let html = `<div class="section-label">Активные чаты</div>`;
            chats.forEach(chat => {
                const expiry = new Date(chat.expires_at);
                const now = new Date();
                let daysNum = Math.max(0, Math.ceil((expiry - now) / 86400000) - 2);
                const daysText = formatDays(daysNum);

                let badgeClass = '';
                let avatarClass = 'orange';
                if (daysNum === 0) {
                    badgeClass = 'danger';
                    avatarClass = 'orange';
                } else if (daysNum === 1) {
                    badgeClass = 'warning';
                    avatarClass = 'orange';
                }

                html += `<a class="card" href="chat.html?token=${encodeURIComponent(chat.chat_token)}">
                            <div class="card-avatar ${avatarClass}">🎂</div>
                            <div class="card-info">
                                <div class="card-name">${escHtml(chat.birthday_name)}</div>
                                <div class="card-meta">${daysText === 'сегодня' ? '🎉 День рождения сегодня!' : daysText === 'завтра' ? '⭐ День рождения завтра' : `До дня рождения: ${daysText}`}</div>
                            </div>
                            <div class="days-badge ${badgeClass}">
                                <div class="days-num">${daysNum}</div>
                                <div class="days-label">дней</div>
                            </div>
                        </a>`;
            });
            document.getElementById('content').innerHTML = html;

        } catch (e) {
            if (!silent) showError('Не удалось загрузить чаты');
            console.error(e);
        }
    }

    function showGroups() {
        loadGroups();
    }
</script>
</body>
</html>
