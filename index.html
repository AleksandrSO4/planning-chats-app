<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чаты планирования</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff8f2;
            min-height: 100vh;
            color: #1a1a1a;
        }

        .header {
            background: #fff;
            border-bottom: 1px solid #ffe0c8;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-icon {
            width: 38px;
            height: 38px;
            background: #ff6b00;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .header-info { flex: 1; }
        .header-title { font-size: 17px; font-weight: 600; }
        .header-sub { font-size: 12px; color: #ff6b00; margin-top: 2px; }

        .refresh-btn, .back-btn {
            background: #fff3ea;
            border: 1px solid #ffd4b0;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            color: #ff6b00;
        }
        .back-btn { display: none; }
        .back-btn.visible { display: block; }

        .content { padding: 20px; }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #ff6b00;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .chat-card {
            background: #fff;
            border: 1px solid #ffe0c8;
            border-radius: 14px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .chat-card-main {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
            background: #ff6b00;
            color: white;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar.disabled { background: #ccc; }

        .chat-info { flex: 1; }
        .chat-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .chat-label { font-size: 11px; color: #aaa; }

        .days-block {
            text-align: center;
            flex-shrink: 0;
            min-width: 65px;
        }
        .days-number {
            font-size: 26px;
            font-weight: 700;
            color: #ff6b00;
            line-height: 1;
        }
        .days-number.today { color: #ff6b00; }
        .days-number.tomorrow { color: #ffaa00; }
        .days-number.past { color: #aaa; }
        .days-label {
            font-size: 10px;
            color: #aaa;
            margin-top: 2px;
        }

        .chat-footer {
            padding: 6px 16px 10px;
            border-top: 1px solid #f0f0e8;
            font-size: 10px;
            color: #bbb;
            display: flex;
            justify-content: space-between;
        }

        .disabled-chat { opacity: 0.7; background: #f9f9f9; }
        .disabled-chat .chat-card-main { cursor: default; }

        .empty-state { text-align: center; padding: 48px 24px; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
        .empty-sub { font-size: 13px; color: #aaa; }

        .loading { text-align: center; padding: 60px 20px; color: #aaa; }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #ffe0c8;
            border-top-color: #ff6b00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1a1a1a;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeOut 3s ease-out forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">🎉</div>
    <div class="header-info">
        <div class="header-title">Чаты планирования</div>
        <div class="header-sub" id="header-sub">Выберите группу</div>
    </div>
    <button class="refresh-btn" onclick="refresh()">⟳</button>
    <button class="back-btn" id="back-btn" onclick="showGroups()">← Назад</button>
</div>

<div class="content" id="content">
    <div class="loading"><div class="spinner"></div>Загрузка...</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const apiBase = 'https://birthdaybot-production-2460.up.railway.app';
    let userId = null;
    let autoRefresh = null;
    let currentView = 'groups';
    let currentGroupId = null;
    let currentGroupName = '';

    if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
        userId = Telegram.WebApp.initDataUnsafe.user.id;
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#ffffff');
    } else {
        userId = prompt('Введите ваш Telegram ID:');
    }

    if (!userId) {
        showError('Не удалось определить пользователя');
    } else {
        loadGroups();
        startAutoRefresh();
    }

    function formatDaysWord(days) {
        if (days === 1) return 'день';
        if (days >= 2 && days <= 4) return 'дня';
        return 'дней';
    }

    async function loadAvatar(url, elementId) {
        try {
            const fullUrl = url.startsWith('http') ? url : `${apiBase}${url}`;
            const res = await fetch(fullUrl);
            const data = await res.json();
            if (data.exists && data.url) {
                const element = document.getElementById(elementId);
                if (element) {
                    element.innerHTML = `<img src="${data.url}" alt="avatar">`;
                }
            }
        } catch(e) {
            console.error('Avatar load error:', e);
        }
    }

    function getInitial(name) {
        if (!name) return '?';
        const first = name.trim().charAt(0).toUpperCase();
        if (/[А-ЯЁA-Z]/.test(first)) return first;
        return '👥';
    }

    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function startAutoRefresh() {
        if (autoRefresh) clearInterval(autoRefresh);
        autoRefresh = setInterval(() => {
            if (currentView === 'chats' && currentGroupId) {
                loadChats(currentGroupId, currentGroupName, true);
            } else if (currentView === 'groups') {
                loadGroups(true);
            }
        }, 30000);
    }

    function refresh() {
        if (currentView === 'chats' && currentGroupId) {
            loadChats(currentGroupId, currentGroupName, true);
        } else {
            loadGroups(true);
        }
    }

    function showError(msg) {
        document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-title">Ошибка</div><div class="empty-sub">${msg}</div></div>`;
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadGroups(silent = false) {
        if (!silent) {
            document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка групп...</div>';
            document.getElementById('back-btn').classList.remove('visible');
            document.getElementById('header-sub').textContent = 'Выберите группу';
        }
        currentView = 'groups';
        currentGroupId = null;

        try {
            const res = await fetch(`${apiBase}/my_groups/${userId}`);
            const groups = await res.json();

            if (!groups.length) {
                document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Нет групп</div><div class="empty-sub">Вы не состоите ни в одной группе, где есть бот</div></div>`;
                return;
            }

            let html = `<div class="section-label">📋 Ваши группы</div>`;
            groups.forEach(g => {
                const name = g.group_name || `Группа ${g.group_id}`;
                const avatarId = `avatar-group-${g.group_id}`;
                const initial = getInitial(name);
                html += `<div class="chat-card" onclick="loadChats(${g.group_id}, '${escHtml(name)}')">
                            <div class="chat-card-main">
                                <div class="avatar" id="${avatarId}">${initial}</div>
                                <div class="chat-info">
                                    <div class="chat-name">${escHtml(name)}</div>
                                    <div class="chat-label">Нажмите, чтобы открыть чаты</div>
                                </div>
                                <div class="days-block">
                                    <div class="days-number">›</div>
                                </div>
                            </div>
                        </div>`;
            });
            document.getElementById('content').innerHTML = html;

            for (const g of groups) {
                const avatarId = `avatar-group-${g.group_id}`;
                loadAvatar(`/avatar/group/${g.group_id}`, avatarId);
            }
        } catch (e) {
            if (!silent) showError('Не удалось загрузить группы');
            console.error(e);
        }
    }

    async function loadChats(groupId, groupName, silent = false) {
        if (!silent) {
            document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Загрузка чатов...</div>';
            document.getElementById('back-btn').classList.add('visible');
            document.getElementById('header-sub').textContent = groupName;
        }
        currentView = 'chats';
        currentGroupId = groupId;
        currentGroupName = groupName;

        try {
            const res = await fetch(`${apiBase}/planning_chats/${groupId}`);
            const chats = await res.json();

            if (!chats.length) {
                document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">🎈</div><div class="empty-title">Нет активных чатов</div><div class="empty-sub">Чаты появятся за 7 дней до дня рождения</div></div>`;
                return;
            }

            let html = `<div class="section-label">🎯 Активные чаты</div>`;

            for (let idx = 0; idx < chats.length; idx++) {
                const chat = chats[idx];
                const isBirthdayBoy = (chat.birthday_user_id == userId);

                // ПРОСТОЕ И ПОНЯТНОЕ ВЫЧИСЛЕНИЕ ДНЕЙ
                let daysUntil = null;

                if (chat.birthday_date) {
                    // Парсим дату из формата "--MM-DD"
                    const clean = chat.birthday_date.replace('--', '');
                    const month = parseInt(clean.substring(0, 2), 10);
                    const day = parseInt(clean.substring(3, 5), 10);

                    // Сегодняшняя дата БЕЗ времени
                    const now = new Date();
                    const todayClean = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const currentYear = now.getFullYear();

                    // Создаём дату ДР в этом году
                    let birthday = new Date(currentYear, month - 1, day);

                    // Если ДР уже был в этом году (строго раньше сегодня), берём следующий год
                    if (birthday < todayClean) {
                        birthday = new Date(currentYear + 1, month - 1, day);
                    }

                    // Вычисляем разницу в целых днях
                    const diffTime = birthday - todayClean;
                    daysUntil = Math.round(diffTime / (1000 * 3600 * 24));


                    // Дополнительная проверка: если разница 0 или отрицательная, но это сегодня
                    if (daysUntil === 0 || (daysUntil < 0 && birthday.toDateString() === today.toDateString())) {
                        daysUntil = 0;
                    }
                } else {
                    // fallback из expires_at
                    const expiryDate = new Date(chat.expires_at);
                    const birthdayDate = new Date(expiryDate);
                    birthdayDate.setDate(birthdayDate.getDate() - 2);
                    const diffTime = birthdayDate - new Date();
                    daysUntil = Math.ceil(diffTime / (1000 * 3600 * 24));
                }

                // Определяем статус
                let status = 'upcoming';
                let daysNumText = '';
                let daysWord = '';
                let avatarId = `avatar-user-${chat.birthday_user_id}`;
                let initial = getInitial(chat.birthday_name);
                let avatarUrl = `/avatar/user/${chat.birthday_user_id}`;
                let cardClass = '';
                let clickHandler = '';

                if (isBirthdayBoy) {
                    cardClass = 'disabled-chat';
                    clickHandler = 'onclick="showSurpriseMessage()"';
                } else {
                    clickHandler = `onclick="window.location.href='chat.html?token=${encodeURIComponent(chat.chat_token)}&name=${encodeURIComponent(chat.birthday_name)}'"`;
                }

                if (daysUntil < 0) {
                    status = 'past';
                    daysNumText = '✓';
                    daysWord = 'прошёл';
                } else if (daysUntil === 0) {
                    status = 'today';
                    daysNumText = '🎉';
                    daysWord = 'сегодня';
                } else if (daysUntil === 1) {
                    status = 'tomorrow';
                    daysNumText = '⭐';
                    daysWord = 'завтра';
                } else {
                    daysNumText = daysUntil;
                    daysWord = formatDaysWord(daysUntil);
                }

                // Дни до закрытия чата
                const expiryDate = new Date(chat.expires_at);
                const localExpiry = new Date(expiryDate.getFullYear(), expiryDate.getMonth(), expiryDate.getDate());
                const today = new Date();
                const localToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                let expiresDays = Math.round((localExpiry - localToday) / (1000 * 3600 * 24));
                let expiresText = expiresDays > 0 ? `Чат закроется через ${expiresDays} ${formatDaysWord(expiresDays)}` : 'Чат скоро закроется';

                html += `
                    <div class="chat-card ${cardClass}">
                        <div class="chat-card-main" ${clickHandler}>
                            <div class="avatar ${isBirthdayBoy ? 'disabled' : ''}" id="${avatarId}">${initial}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escHtml(chat.birthday_name)}</div>
                                <div class="chat-label">${isBirthdayBoy ? '🎁 Чат скрыт' : (status === 'past' ? 'День рождения прошёл' : 'До дня рождения:')}</div>
                            </div>
                            <div class="days-block">
                                <div class="days-number ${status === 'past' ? 'past' : (status === 'today' ? 'today' : (status === 'tomorrow' ? 'tomorrow' : ''))}">
                                    ${daysNumText}
                                </div>
                                <div class="days-label">${daysWord}</div>
                            </div>
                        </div>
                        <div class="chat-footer">
                            <span>⏱️ ${expiresText}</span>
                            <span>${isBirthdayBoy ? '🔒 Недоступен' : '💬 Открыть чат →'}</span>
                        </div>
                    </div>
                `;
            }
            document.getElementById('content').innerHTML = html;

            for (const chat of chats) {
                const avatarId = `avatar-user-${chat.birthday_user_id}`;
                loadAvatar(`/avatar/user/${chat.birthday_user_id}`, avatarId);
            }
        } catch (e) {
            if (!silent) showError('Не удалось загрузить чаты');
            console.error(e);
        }
    }

    function showSurpriseMessage() {
        showToast('🎁 Эй! Тебе сейчас активно готовят сюрприз! Дождись дня рождения! 🎂');
    }

    function showGroups() { loadGroups(); }
</script>
</body>
</html>
